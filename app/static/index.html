<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marketing Dashboard — Google Analytics</title>
  <style>
    :root { --brand: #1a73e8; --bg: #f6f8fc; --card: #fff; --text: #202124; --muted: #5f6368; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
           background: var(--bg); color: var(--text); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin: 0 0 4px; }
    p.sub { color: var(--muted); margin: 0 0 28px; }
    .card { background: var(--card); border: 1px solid #e0e3e7; border-radius: 12px;
            padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    button, .btn { background: var(--brand); color: #fff; border: 0; border-radius: 8px;
                   padding: 10px 18px; font-size: 15px; cursor: pointer; text-decoration: none;
                   display: inline-block; }
    button:hover, .btn:hover { background: #1666d0; }
    select { padding: 10px; font-size: 15px; border-radius: 8px; border: 1px solid #d0d4d9;
             min-width: 320px; max-width: 100%; }
    label { display: block; font-weight: 600; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eceff1; }
    th { color: var(--muted); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: .03em; }
    .muted { color: var(--muted); }
    .hidden { display: none; }
    .badge { display: inline-block; background: #e6f4ea; color: #137333; border-radius: 999px;
             padding: 4px 12px; font-size: 13px; font-weight: 600; }
    .spinner { color: var(--muted); }
    .error { color: #c5221f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Marketing Dashboard</h1>
    <p class="sub">Bekijk je Google Analytics 4-gegevens — actieve gebruikers per land (laatste 7 dagen).</p>

    <!-- Not connected -->
    <div id="connect-card" class="card hidden">
      <label>Nog niet gekoppeld</label>
      <p class="muted">Koppel een Google-account om je Analytics-data te bekijken.</p>
      <a class="btn" href="/api/auth/google/login">Koppel Google Analytics</a>
    </div>

    <!-- Connected -->
    <div id="picker-card" class="card hidden">
      <span class="badge">Verbonden ✓</span>
      <div style="margin-top:16px;">
        <label for="property">Kies een property</label>
        <select id="property"></select>
      </div>
    </div>

    <div id="report-card" class="card hidden">
      <div id="report-title" class="muted"></div>
      <div id="report-body"></div>
    </div>

    <div id="status" class="spinner">Laden…</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const show = (el) => el.classList.remove("hidden");
    const hide = (el) => el.classList.add("hidden");

    async function init() {
      try {
        const res = await fetch("/api/analytics/properties");
        if (res.status === 401) { hide($("status")); show($("connect-card")); return; }
        if (!res.ok) throw new Error("Kon properties niet laden (" + res.status + ")");
        const data = await res.json();
        hide($("status"));
        renderProperties(data.properties || []);
      } catch (e) {
        $("status").className = "error";
        $("status").textContent = "Fout: " + e.message;
      }
    }

    function renderProperties(props) {
      show($("picker-card"));
      const sel = $("property");
      if (props.length === 0) {
        sel.innerHTML = '<option value="">Geen properties gevonden voor dit account</option>';
        return;
      }
      sel.innerHTML = '<option value="">— kies —</option>' + props.map(p =>
        `<option value="${p.property_id}">${p.display_name} (${p.account}) · ${p.property_id}</option>`
      ).join("");
      sel.addEventListener("change", () => {
        if (sel.value) loadReport(sel.value, sel.options[sel.selectedIndex].text);
      });
    }

    async function loadReport(propertyId, label) {
      show($("report-card"));
      $("report-title").textContent = "Rapport voor: " + label;
      $("report-body").innerHTML = '<p class="spinner">Data ophalen…</p>';
      try {
        const res = await fetch("/api/analytics/report?property_id=" + encodeURIComponent(propertyId));
        if (!res.ok) {
          const txt = await res.text();
          throw new Error("API gaf " + res.status + ". " + txt.slice(0, 200));
        }
        const data = await res.json();
        renderReport(data.rows || []);
      } catch (e) {
        $("report-body").innerHTML = '<p class="error">Fout: ' + e.message + '</p>';
      }
    }

    function renderReport(rows) {
      if (rows.length === 0) {
        $("report-body").innerHTML = '<p class="muted">Geen data in deze periode.</p>';
        return;
      }
      const body = rows.map(r =>
        `<tr><td>${r.country}</td><td>${r.activeUsers}</td></tr>`
      ).join("");
      $("report-body").innerHTML =
        `<table><thead><tr><th>Land</th><th>Actieve gebruikers</th></tr></thead><tbody>${body}</tbody></table>`;
    }

    init();
  </script>
</body>
</html>
